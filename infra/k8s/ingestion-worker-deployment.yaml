apiVersion: apps/v1
kind: Deployment
metadata:
  name: cognitive-substrate-ingestion-worker
  labels:
    app.kubernetes.io/name: cognitive-substrate
    app.kubernetes.io/component: ingestion-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cognitive-substrate
      app.kubernetes.io/component: ingestion-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cognitive-substrate
        app.kubernetes.io/component: ingestion-worker
    spec:
      containers:
        - name: ingestion-worker
          image: cognitive-substrate/ingestion-worker:latest
          imagePullPolicy: Never
          env:
            - name: ENVIRONMENT
              value: dev
            - name: KAFKA_GROUP_ID
              value: ingestion-workers
            - name: KAFKA_CLIENT_ID
              value: ingestion-worker
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: kafka-brokers
            - name: KAFKA_SSL
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: kafka-ssl
            - name: KAFKA_SASL_MECHANISM
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: kafka-sasl-mechanism
            - name: KAFKA_SASL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: kafka-username
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: kafka-password
            - name: OPENSEARCH_URL
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: opensearch-url
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: opensearch-username
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: opensearch-password
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: s3-bucket
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: s3-endpoint
            - name: S3_REGION
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: s3-region
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: s3-access-key-id
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: s3-secret-access-key
            - name: S3_FORCE_PATH_STYLE
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: s3-force-path-style
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
