apiVersion: apps/v1
kind: Deployment
metadata:
  name: cognitive-substrate-pattern-worker
  labels:
    app.kubernetes.io/name: cognitive-substrate
    app.kubernetes.io/component: pattern-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cognitive-substrate
      app.kubernetes.io/component: pattern-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cognitive-substrate
        app.kubernetes.io/component: pattern-worker
    spec:
      containers:
        - name: pattern-worker
          image: cognitive-substrate/pattern-worker:latest
          imagePullPolicy: Never
          env:
            - name: ENVIRONMENT
              value: dev
            - name: KAFKA_GROUP_ID
              value: pattern-workers
            - name: KAFKA_CLIENT_ID
              value: pattern-worker
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: kafka-brokers
            - name: KAFKA_SSL
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: kafka-ssl
            - name: KAFKA_SASL_MECHANISM
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: kafka-sasl-mechanism
            - name: KAFKA_SASL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: kafka-username
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: kafka-password
            - name: OPENSEARCH_URL
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: opensearch-url
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: opensearch-username
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: opensearch-password
            - name: CLICKHOUSE_URL
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: clickhouse-url
            - name: CLICKHOUSE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: clickhouse-username
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: clickhouse-password
            - name: CLICKHOUSE_DATABASE
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: clickhouse-database
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
