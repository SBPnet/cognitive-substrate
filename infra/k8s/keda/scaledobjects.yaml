# Bootstrap servers are substituted by scripts/k8s/apply-keda.sh (see BOOTSTRAP_SERVERS_PLACEHOLDER).
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: cognitive-substrate-ingestion-worker-scaler
  namespace: cognitive
spec:
  scaleTargetRef:
    name: cognitive-substrate-ingestion-worker
  minReplicaCount: 1
  maxReplicaCount: 5
  pollingInterval: 30
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: BOOTSTRAP_SERVERS_PLACEHOLDER
        consumerGroup: ingestion-workers
        topic: experience.raw
        lagThreshold: "500"
        offsetResetPolicy: latest
      authenticationRef:
        name: cognitive-substrate-kafka-trigger-auth
