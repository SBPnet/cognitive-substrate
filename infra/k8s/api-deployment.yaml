apiVersion: apps/v1
kind: Deployment
metadata:
  name: cognitive-substrate-api
  labels:
    app.kubernetes.io/name: cognitive-substrate
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cognitive-substrate
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cognitive-substrate
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: cognitive-substrate/api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: API_PORT
              value: "3001"
            - name: API_CORS_ORIGIN
              value: "http://localhost:3000"
            - name: KAFKA_GROUP_ID
              value: api-bff-consumers
            - name: KAFKA_CLIENT_ID
              value: api-bff
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: kafka-brokers
            - name: KAFKA_SSL
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: kafka-ssl
            - name: KAFKA_SASL_MECHANISM
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: kafka-sasl-mechanism
            - name: KAFKA_SASL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: kafka-username
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: kafka-password
            - name: OPENSEARCH_URL
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: opensearch-url
            - name: OPENSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: opensearch-username
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: opensearch-password
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: cognitive-substrate-aiven
                  key: otel-endpoint
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cognitive-substrate-api
  labels:
    app.kubernetes.io/name: cognitive-substrate
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: cognitive-substrate
    app.kubernetes.io/component: api
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
