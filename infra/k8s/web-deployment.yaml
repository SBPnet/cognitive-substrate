apiVersion: apps/v1
kind: Deployment
metadata:
  name: cognitive-substrate-web
  labels:
    app.kubernetes.io/name: cognitive-substrate
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cognitive-substrate
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cognitive-substrate
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: cognitive-substrate/web:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cognitive-substrate-web
  labels:
    app.kubernetes.io/name: cognitive-substrate
    app.kubernetes.io/component: web
spec:
  selector:
    app.kubernetes.io/name: cognitive-substrate
    app.kubernetes.io/component: web
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
