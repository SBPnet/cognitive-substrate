# Deep smoke runs against the OSS stack from docker-compose.smoke.yml (started
# by scripts/smoke/deep-smoke.ts). No managed-cluster secrets required.
name: Deep Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke-deep:
    name: Deep smoke baseline
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Prepare OpenSearch host settings
        run: sudo sysctl -w vm.max_map_count=262144

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run deep smoke baseline
        env:
          SMOKE_ARTIFACT_DIR: artifacts/smoke/deep-smoke-ci
        run: pnpm smoke:deep

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deep-smoke-${{ github.run_id }}
          path: artifacts/smoke/
          if-no-files-found: warn
