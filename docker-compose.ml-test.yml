# Local ML embedding test stack.
#
# Purpose: run OpenSearch with ML Commons enabled and
# plugins.ml_commons.only_run_on_ml_node=false so that embedding
# inference works on a single-node cluster (M4 laptop / Colima / CI).
#
# This is intentionally separate from docker-compose.smoke.yml so the
# regular smoke suite is unaffected.
#
# Usage:
#   docker compose -f docker-compose.ml-test.yml up -d
#   pnpm smoke:embedding          # run the model-swap test script
#   docker compose -f docker-compose.ml-test.yml down -v

services:
  # ---------------------------------------------------------------------------
  # OpenSearch 2.17 — includes ML Commons plugin out of the box.
  # Security is disabled; ML node pinning is turned off so the single node
  # can run both search and ML workloads.  This mirrors the Aiven experimental
  # setting (plugins.ml_commons.only_run_on_ml_node=false).
  # ---------------------------------------------------------------------------
  opensearch:
    image: opensearchproject/opensearch:2.17.0
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx2g"
      # Allow ML workloads on non-ML-role nodes (mirrors Aiven ACL setting).
      plugins.ml_commons.only_run_on_ml_node: "false"
      # Allow model registration from remote URLs (needed for HuggingFace).
      plugins.ml_commons.allow_registering_model_via_url: "true"
      # Raise native memory threshold so HNSW k-NN index creation succeeds.
      plugins.ml_commons.native_memory_threshold: "99"
      # Circuit-breaker settings to allow model deployment on small nodes.
      plugins.ml_commons.jvm_heap_memory_threshold: "0"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'",
        ]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

  # ---------------------------------------------------------------------------
  # OpenSearch Dashboards — optional, convenient for inspecting indexes and
  # the ML Commons model registry during local experiments.
  # Browse at http://localhost:5601
  # ---------------------------------------------------------------------------
  dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.0
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_healthy
