# Multi-node OpenSearch cluster with a dedicated ML node.
#
# Topology
#   opensearch-node1   cluster-manager + data           port 9200
#   opensearch-node2   data                             port 9201
#   opensearch-ml1     ml (no data, no cluster-manager) port 9202
#   opensearch-dashboards                               port 5601
#
# ML workloads (model registration, inference) are pinned to opensearch-ml1
# via plugins.ml_commons.only_run_on_ml_node=true.
#
# Prerequisites:
#   Docker Desktop (Mac/Windows): none — vm.max_map_count is set automatically.
#   Linux host: sudo sysctl -w vm.max_map_count=262144
#
# Usage:
#   docker compose -f docker-compose.opensearch-cluster.yml up -d
#   docker compose -f docker-compose.opensearch-cluster.yml down -v
#
# Thor migration:
#   Replace container hostnames with real node IPs in discovery.seed_hosts
#   and cluster.initial_cluster_manager_nodes, enable the security plugin,
#   and set network.host to the node's actual interface address.

x-opensearch-common: &opensearch-common
  image: opensearchproject/opensearch:3.3.2
  restart: unless-stopped
  ulimits:
    memlock:
      soft: -1
      hard: -1
    nofile:
      soft: 65536
      hard: 65536
  environment: &opensearch-env
    cluster.name: cognitive-substrate
    discovery.seed_hosts: opensearch-node1,opensearch-node2,opensearch-ml1
    cluster.initial_cluster_manager_nodes: opensearch-node1
    DISABLE_SECURITY_PLUGIN: "true"
    # Allow model registration from remote URLs (HuggingFace, S3, etc.)
    plugins.ml_commons.allow_registering_model_via_url: "true"
    # Raise thresholds so model deployment works on dev-sized nodes.
    plugins.ml_commons.native_memory_threshold: "99"
    plugins.ml_commons.jvm_heap_memory_threshold: "0"
    # Pin ML inference to the ml-role node.
    plugins.ml_commons.only_run_on_ml_node: "true"

services:
  # ---------------------------------------------------------------------------
  # Node 1 — cluster-manager + data
  # ---------------------------------------------------------------------------
  opensearch-node1:
    <<: *opensearch-common
    container_name: opensearch-node1
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      <<: *opensearch-env
      node.name: opensearch-node1
      node.roles: cluster_manager,data,ingest
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx2g"
    healthcheck:
      test:
        - CMD-SHELL
        - curl -sf http://localhost:9200/_cluster/health | grep -qE '"status":"(green|yellow)"'
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    volumes:
      - opensearch-node1-data:/usr/share/opensearch/data

  # ---------------------------------------------------------------------------
  # Node 2 — data only
  # ---------------------------------------------------------------------------
  opensearch-node2:
    <<: *opensearch-common
    container_name: opensearch-node2
    ports:
      - "9201:9200"
      - "9301:9300"
    environment:
      <<: *opensearch-env
      node.name: opensearch-node2
      node.roles: data,ingest
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx2g"
    depends_on:
      opensearch-node1:
        condition: service_healthy
    volumes:
      - opensearch-node2-data:/usr/share/opensearch/data

  # ---------------------------------------------------------------------------
  # ML node — dedicated ML Commons inference node, no data shards
  # ---------------------------------------------------------------------------
  opensearch-ml1:
    <<: *opensearch-common
    container_name: opensearch-ml1
    ports:
      - "9202:9200"
      - "9302:9300"
    environment:
      <<: *opensearch-env
      node.name: opensearch-ml1
      node.roles: ml
      # ML nodes benefit from more heap for model weights.
      OPENSEARCH_JAVA_OPTS: "-Xms2g -Xmx4g"
    depends_on:
      opensearch-node1:
        condition: service_healthy
    volumes:
      - opensearch-ml1-data:/usr/share/opensearch/data

  # ---------------------------------------------------------------------------
  # Dashboards — browse cluster state and ML model registry at http://localhost:5601
  # ---------------------------------------------------------------------------
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.3.0
    container_name: opensearch-dashboards
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      # Point at node1; the cluster round-robins from there.
      OPENSEARCH_HOSTS: '["http://opensearch-node1:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch-node1:
        condition: service_healthy

volumes:
  opensearch-node1-data:
  opensearch-node2-data:
  opensearch-ml1-data:
